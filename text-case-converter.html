<!DOCTYPE html>
<html lang="en">
<head>

<link rel="shortcut icon" href="/favicon.png" type="image/png">
<link rel="icon" href="/favicon.png" type="image/png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Case Converter - ToolNest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
color:#222;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:250px;
padding:15px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
resize:vertical;
outline:none;
}

.buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

button{
padding:14px;
font-size:16px;
border:none;
border-radius:10px;
background:#007bff;
color:#fff;
cursor:pointer;
transition:.3s;
}

button:hover{.back{
display:inline-block;
margin-top:25px;
padding:12px 20px;
background:#222;
color:#fff;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔤 Text Case Converter</h1>

<textarea
id="text"
placeholder="Type or paste your text here..."></textarea>

<div class="buttons">

<button onclick="toUpperCaseText()">
UPPERCASE
</button>

<button onclick="toLowerCaseText()">
lowercase
</button>

<button onclick="toTitleCase()">
Title Case
</button>

<button onclick="toSentenceCase()">
Sentence Case
</button>

<button onclick="copyText()">
📋 Copy Text
</button>

<button onclick="clearText()">
🗑 Clear Text
</button>

</div>

<a class="back" href="index.html"><script>

function toUpperCaseText(){
let text=document.getElementById("text");
text.value=text.value.toUpperCase();
}

function toLowerCaseText(){
let text=document.getElementById("text");
text.value=text.value.toLowerCase();
}

function toTitleCase(){
let text=document.getElementById("text");

text.value=text.value
.toLowerCase()
.replace(/\b\w/g,function(letter){
return letter.toUpperCase();
});
}

function toSentenceCase(){
let text=document.getElementById("text");

let value=text.value.toLowerCase();

text.value=value.charAt(0).toUpperCase()+value.slice(1);
}

function copyText(){
let text=document.getElementById("text");
text.select();
document.execCommand("copy");
alert("Text copied successfully!");
}

function clearText(){
document.getElementById("text").value="";
}

</script>

</body><div class="card">
<h2>🔤 Text Case Converter</h2>
<a href="text-case-converter.html">Open Tool</a>
</div>
</html>
