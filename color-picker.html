<!DOCTYPE html>
<html lang="en">
<head>

<link rel="shortcut icon" href="/favicon.png" type="image/png">
<link rel="icon" href="/favicon.png" type="image/png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Picker - ToolNest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
color:#222;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:25px;
}

input[type="color"]{
display:block;
width:150px;
height:100px;
margin:20px auto;
cursor:pointer;
}

.box{
text-align:center;
background:#f1f1f1;
padding:15px;
border-radius:10px;
margin-top:15px;
font-size:18px;
}

button{
display:block;
margin:20px auto;
padding:12px 25px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.back{
display:inline-block;
margin-top:25px;
padding:12px 20px;
background:#222;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎨 Color Picker</h1>

<input type="color" id="color" value="#007bff">

<div class="box">
HEX:
<span id="hex">#007bff</span>
</div>

<div class="box">
RGB:
<span id="rgb">rgb(0,123,255)</span>
</div><button onclick="copyCode()">
Copy HEX Code
</button>

<a class="back" href="index.html">
⬅ Back To Home
</a>

</div>


<script>

let color=document.getElementById("color");


color.addEventListener("input",function(){

let hex=color.value;

document.getElementById("hex").innerHTML=hex;


let r=parseInt(hex.substring(1,3),16);
let g=parseInt(hex.substring(3,5),16);
let b=parseInt(hex.substring(5,7),16);


document.getElementById("rgb").innerHTML=
"rgb("+r+","+g+","+b+")";


});


function copyCode(){

let code=document.getElementById("hex").innerHTML;

navigator.clipboard.writeText(code);

alert("HEX code copied!");

}

</script>

</body>
</html>
