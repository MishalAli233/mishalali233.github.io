<!DOCTYPE html>
<html lang="en">
<head>

<link rel="shortcut icon" href="/favicon.png" type="image/png">
<link rel="icon" href="/favicon.png" type="image/png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown Timer - ToolNest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:12px 25px;
font-size:16px;
background:#007bff;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0056b3;
}

#timer{
font-size:40px;
font-weight:bold;
margin:25px 0;
color:#007bff;
}

.back{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#222;
color:#fff;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>⏱️ Countdown Timer</h1>

<input
type="number"
id="minutes"
placeholder="Enter minutes">

<button onclick="startTimer()">
Start Timer
</button>

<div id="timer">
00:00
</div><a class="back" href="index.html">
⬅ Back To Home
</a>

</div>

<script>

let countdown;

function startTimer(){

clearInterval(countdown);

let minutes=parseInt(document.getElementById("minutes").value);

if(isNaN(minutes) || minutes<=0){

document.getElementById("timer").innerHTML="Enter valid minutes";

return;

}

let time=minutes*60;

countdown=setInterval(function(){

let mins=Math.floor(time/60);

let secs=time%60;

document.getElementById("timer").innerHTML=

String(mins).padStart(2,"0")+":"+

String(secs).padStart(2,"0");


if(time<=0){

clearInterval(countdown);

document.getElementById("timer").innerHTML=

"⏰ Time's Up!";

}

time--;

},1000);

}

</script>

</body>
</html>
