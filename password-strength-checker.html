<!DOCTYPE html>
<html lang="en">
<head>

<link rel="shortcut icon" href="/favicon.png" type="image/png">
<link rel="icon" href="/favicon.png" type="image/png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Strength Checker - ToolNest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
color:#222;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:2px solid #ddd;
border-radius:10px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#result{
margin-top:25px;
padding:15px;
border-radius:10px;
background:#f1f1f1;
font-size:18px;
}

.back{
display:inline-block;
margin-top:25px;
padding:12px 20px;
background:#222;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔐 Password Strength Checker</h1>

<input 
type="password"
id="password"
placeholder="Enter your password">

<button onclick="checkPassword()">
Check Strength
</button>

<div id="result">
Result will appear here
</div><a class="back" href="index.html">
⬅ Back To Home
</a>

</div>


<script>

function checkPassword(){

let password=document.getElementById("password").value;

let result=document.getElementById("result");


let score=0;


if(password.length>=8){
score++;
}

if(/[A-Z]/.test(password)){
score++;
}

if(/[a-z]/.test(password)){
score++;
}

if(/[0-9]/.test(password)){
score++;
}

if(/[!@#$%^&*]/.test(password)){
score++;
}


if(score<=2){

result.innerHTML=
"❌ Weak Password";

}
else if(score<=4){

result.innerHTML=
"⚠️ Medium Password";

}
else{

result.innerHTML=
"✅ Strong Password";

}


}

</script>

</body>
</html>
