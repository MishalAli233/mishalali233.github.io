<!DOCTYPE html>
<html lang="en">
<head>

<link rel="shortcut icon" href="/favicon.png" type="image/png">
<link rel="icon" href="/favicon.png" type="image/png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Random Number Generator - ToolNest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
color:#222;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-size:18px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
font-size:16px;
border:2px solid #ddd;
border-radius:10px;
}

button{
margin-top:20px;
padding:12px 25px;
background:#007bff;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#result{
margin-top:25px;
padding:15px;
background:#f1f1f1;
border-radius:10px;
font-size:22px;
text-align:center;
}

.back{
display:inline-block;
margin-top:25px;
padding:12px 20px;
background:#222;
color:#fff;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🎲 Random Number Generator</h1>

<label>Minimum Number</label>
<input type="number" id="min" placeholder="Enter minimum value">

<label>Maximum Number</label>
<input type="number" id="max" placeholder="Enter maximum value">

<button onclick="generateRandom()">
Generate Random Number
</button>

<div id="result">
Your random number will appear here
</div><a class="back" href="index.html">
⬅ Back To Home
</a>

</div>

<script>

function generateRandom(){

let min=parseInt(document.getElementById("min").value);
let max=parseInt(document.getElementById("max").value);

if(isNaN(min) || isNaN(max)){
document.getElementById("result").innerHTML=
"Please enter both minimum and maximum values.";
return;
}

if(min>max){
document.getElementById("result").innerHTML=
"Minimum value must be less than or equal to maximum value.";
return;
}

let random=
Math.floor(Math.random()*(max-min+1))+min;

document.getElementById("result").innerHTML=
"🎉 Random Number: <b>"+random+"</b>";

}

</script>

</body>
</html>
